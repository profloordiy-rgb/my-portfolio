<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courosel Animation</title>
    <style>
.container {
    margin: 100px auto;
    width: 90%;
    display: flex;
    border: 2px solid black;
    overflow: x-auto;
    gap: 1em;
    padding-right: 1em;
}
.container::-webkit-scrollbar{
    display:none;
}
.group {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1em;
    animation: slide 5s infinite linear;
    padding-right: 1em
}
.item{
flex:0 0 1em;
    height: 5em;
    width:5em;
    padding: 1em;
    text-align: center;
    align-content: center;
    background-color: #3305ff;
}
@keyframes slide {
    from{translateX: 0;}
    to{translateX: -100%;}
}
    </style>
</head>
<body>
    <div class="container">
        <div class="group">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
          <div class="item">4</div>
          <div class="item">5</div>
          <div class="item">6</div>
       
        </div>
    </div>
</body>
</html>
